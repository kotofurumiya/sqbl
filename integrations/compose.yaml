services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: sqbl
      POSTGRES_PASSWORD: sqbl
      POSTGRES_DB: sqbl_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqbl -d sqbl_test"]
      interval: 5s
      timeout: 5s
      retries: 5
  mysql:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: sqbl_root
      MARIADB_USER: sqbl
      MARIADB_PASSWORD: sqbl
      MARIADB_DATABASE: sqbl_test
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "--host=localhost", "--user=sqbl", "--password=sqbl"]
      interval: 5s
      timeout: 5s
      retries: 5
